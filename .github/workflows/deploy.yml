name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CHAT_API_URL: ${{ secrets.VITE_CHAT_API_URL }}

      - name: Generate responsive previews
        run: |
          npx -y playwright@1.52.0 install chromium
          npx vite preview --host 127.0.0.1 --port 4173 > /tmp/portfolio-preview.log 2>&1 &
          for attempt in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
          mkdir -p docs/previews
          npx -y playwright@1.52.0 screenshot --browser chromium --viewport-size "1440,1100" --full-page http://127.0.0.1:4173/ docs/previews/portfolio-desktop.png
          npx -y playwright@1.52.0 screenshot --browser chromium --device "iPhone 13" --full-page http://127.0.0.1:4173/ docs/previews/portfolio-mobile.png

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./docs

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
